# TechRen EDU — Railway (NEW service only)
# Leave the existing SMS / PWA Railway service untouched.
#
# Root Directory: leave EMPTY (whole monorepo).
# Builder: Dockerfile at repo root (more reliable than Nixpacks for this monorepo).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
